<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./home.css">
</head>
<body>
  <div class="main">
    <h1>Join or create a room</h1>
    <div class="input-content">
      <div class="create-room">
        <h2>Create Room</h2>
        <h3>Enter Username</h3>
        <input type="text" id="create-username">
        <button id="createRoom" class="createRoom">Create Room</button>
      </div>
      <div class="join-room">
        <h2>Join Room</h2>
        <h3>Enter Username</h3>
        <input type="text" id="join-username" class="join-username">
        <h3>Enter Roon ID</h3>
        <input type="text" class="room-ID" id="room-ID">
        <button id="joinRoom" class="joinRoom">Join Room</button>
      </div>
    </div>
  </div>
  <script src="./home.js"> </script>
</body>
</html>
